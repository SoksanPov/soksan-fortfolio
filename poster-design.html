<!doctype html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Poster Design | Sok San Pov</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <style>
      body {
        font-family: Arial, Helvetica, sans-serif;
      }

      .gallery img {
        transition: 0.4s;
      }

      .gallery img:hover {
        transform: scale(1.05);
      }
    </style>
  </head>

  <body class="bg-gray-100">
    <!-- Hero -->

    <section
      class="bg-gradient-to-r from-blue-700 to-indigo-700 text-white py-20"
    >
      <div class="max-w-6xl mx-auto px-6">
        <h1 class="text-5xl font-bold mb-4">Poster Design Portfolio</h1>

        <p class="text-lg opacity-90 max-w-3xl">
          Collection of poster, banner, social media, event promotion and
          marketing designs created using Canva and Adobe Photoshop.
        </p>

        <a
          href="index.html"
          class="inline-block mt-8 bg-white text-blue-700 px-6 py-3 rounded-lg font-semibold hover:bg-blue-100 transition"
        >
          ← Back to Portfolio
        </a>
      </div>
    </section>

    <!-- Gallery -->

    <section class="py-20">
      <div class="max-w-6xl mx-auto px-6">
        <div class="gallery grid md:grid-cols-3 lg:grid-cols-4 gap-6">
          <!-- Images -->

          <script>
            for (let i = 1; i <= 16; i++) {
              document.write(`

<div>

<img 
src="img/img (${i}).jpg"

alt="Poster Design ${i}"

class="rounded-xl cursor-pointer shadow-lg w-full">

</div>

`);
            }
          </script>
        </div>
      </div>
    </section>

    <!-- Lightbox -->

    <div
      id="lightbox"
      class="fixed inset-0 bg-black/90 hidden items-center justify-center z-50"
    >
      <button id="close" class="absolute top-6 right-8 text-white text-5xl">
        &times;
      </button>

      <img id="lightbox-img" class="max-w-5xl max-h-[90vh] rounded-lg" />
    </div>

    <script>
      // Lightbox

      const lightbox = document.getElementById("lightbox");

      const lightboxImg = document.getElementById("lightbox-img");

      document.querySelectorAll(".gallery img").forEach((img) => {
        img.onclick = () => {
          lightbox.classList.remove("hidden");

          lightbox.classList.add("flex");

          lightboxImg.src = img.src;
        };
      });

      document.getElementById("close").onclick = () => {
        lightbox.classList.add("hidden");

        lightbox.classList.remove("flex");
      };

      lightbox.onclick = (e) => {
        if (e.target === lightbox) {
          lightbox.classList.add("hidden");

          lightbox.classList.remove("flex");
        }
      };
    </script>
  </body>
</html>
